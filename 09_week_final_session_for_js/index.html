<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <h1 class="title">To-Do List <span>📝</span></h1>

        <div class="input-group">
          <input id="input-add" type="text" placeholder="add your task here" />
          <button id="btn-add">Add</button>
        </div>

        <ul class="todo-list">
          <input type="checkbox" name="" id="" />
        </ul>
        <span class="deleteAll">delete all</span>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
